services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: whatflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  app:
    depends_on:
      - postgres
      - redis
      - minio
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/whatflow?schema=public
      REDIS_URL: redis://redis:6379
      OBJECT_STORAGE_PROVIDER: s3
      OBJECT_STORAGE_ENDPOINT: http://minio:9000
      OBJECT_STORAGE_BUCKET: whatflow
      OBJECT_STORAGE_ACCESS_KEY_ID: minio
      OBJECT_STORAGE_SECRET_ACCESS_KEY: minio123
      OBJECT_STORAGE_REGION: us-east-1
      OBJECT_STORAGE_FORCE_PATH_STYLE: "true"

volumes:
  postgres_data:
  redis_data:
  minio_data:
