services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: whatflow:local
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: ${DATABASE_URL:-}
      REDIS_URL: ${REDIS_URL:-}
      OBJECT_STORAGE_PROVIDER: ${OBJECT_STORAGE_PROVIDER:-local}
      OBJECT_STORAGE_ENDPOINT: ${OBJECT_STORAGE_ENDPOINT:-}
      OBJECT_STORAGE_BUCKET: ${OBJECT_STORAGE_BUCKET:-}
      OBJECT_STORAGE_ACCESS_KEY_ID: ${OBJECT_STORAGE_ACCESS_KEY_ID:-}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${OBJECT_STORAGE_SECRET_ACCESS_KEY:-}
      OBJECT_STORAGE_REGION: ${OBJECT_STORAGE_REGION:-}
      OBJECT_STORAGE_FORCE_PATH_STYLE: ${OBJECT_STORAGE_FORCE_PATH_STYLE:-false}
      PORT: ${PORT:-3001}
      APP_URL: ${APP_URL:-http://localhost:3001}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-24}
      PLATFORM_ADMIN_NAME: ${PLATFORM_ADMIN_NAME:-Whatflow Admin}
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL:-admin@example.com}
      PLATFORM_ADMIN_PASSWORD: ${PLATFORM_ADMIN_PASSWORD:-change-me}
      META_GRAPH_BASE_URL: ${META_GRAPH_BASE_URL:-https://graph.facebook.com}
      META_GRAPH_VERSION: ${META_GRAPH_VERSION:-v23.0}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN:-}
      META_WABA_ID: ${META_WABA_ID:-}
      META_PHONE_NUMBER_ID: ${META_PHONE_NUMBER_ID:-}
      META_APP_ID: ${META_APP_ID:-}
      META_APP_SECRET: ${META_APP_SECRET:-}
      META_CONFIGURATION_ID: ${META_CONFIGURATION_ID:-}
      META_SYSTEM_USER_ACCESS_TOKEN: ${META_SYSTEM_USER_ACCESS_TOKEN:-}
      META_WEBHOOK_CALLBACK_URL: ${META_WEBHOOK_CALLBACK_URL:-}
